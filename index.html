<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talking Archy</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a233d;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Fullscreen game screen */
        .game-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Media covers the entire screen */
        .media-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .media-container img, .media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Fill screen without black bars */
        }

        /* Status bar when Archy is listening */
        .status-indicator {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            color: #2ecc71;
            font-weight: bold;
            z-index: 5;
            letter-spacing: 1px;
            animation: blink 1.5s infinite;
            display: none;
        }

        /* Right side panel for controls */
        .side-panel {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        /* Round buttons */
        .btn-round {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, background-color 0.2s;
            user-select: none;
        }

        .btn-round:hover {
            transform: scale(1.08);
        }

        .btn-round:active {
            transform: scale(0.92);
        }

        /* Button Colors */
        .btn-round.call { background-color: #2ecc71; }
        .btn-round.hangup { background-color: #e74c3c; }
        .btn-round.talk { background-color: #f39c12; }
        
        /* Pulse animation for recording state */
        .btn-round.recording { 
            background-color: #c0392b; 
            animation: pulse 1.5s infinite;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1.08); box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="game-screen">
        <!-- Status indicator -->
        <div id="status-bar" class="status-indicator">🎙️ ARCHY IS LISTENING...</div>

        <!-- Fullscreen Media -->
        <div class="media-container">
            <img id="character-img" src="Idle.png" alt="Archy">
            <video id="character-video" class="hidden" playsinline></video>
        </div>

        <!-- Controls -->
        <div class="side-panel">
            <!-- Call Button -->
            <button id="call-btn" class="btn-round call" title="Call">📞</button>
            
            <!-- Repeat/Talk Button -->
            <button id="talk-btn" class="btn-round talk" title="Repeat">🗣️</button>
        </div>
    </div>

    <script>
        const charImg = document.getElementById('character-img');
        const charVideo = document.getElementById('character-video');
        const callBtn = document.getElementById('call-btn');
        const talkBtn = document.getElementById('talk-btn');
        const statusBar = document.getElementById('status-bar');

        // State variables
        let isCalling = false;
        let isRecording = false;
        
        let globalStream = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let activeAudio = null;
        
        // Audio Context for Silence Detection
        let audioContext = null;
        let analyser = null;
        let talkAnimInterval = null;

        // Show Image Function
        function showImage(src) {
            charVideo.classList.add('hidden');
            charVideo.pause();
            charImg.src = src;
            charImg.classList.remove('hidden');
        }

        // Play Video Function
        function playVideo(src, onEndCallback) {
            charImg.classList.add('hidden');
            charVideo.src = src;
            charVideo.classList.remove('hidden');
            charVideo.load();
            charVideo.play().catch(err => console.log("Autoplay blocked:", err));
            charVideo.onended = onEndCallback;
        }

        // Initialize Microphone properly for Chrome
        async function initMicrophone() {
            if (globalStream) return globalStream;
            
            // Check for secure protocol (Chrome requires HTTPS or localhost for Mic)
            if (location.protocol === 'file:') {
                alert("Warning! Chrome blocks microphone access for local files. Please upload the project to a web host (HTTPS) or use a local server.");
            }

            try {
                // Request Mic access
                globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                return globalStream;
            } catch (err) {
                alert("Archy cannot access the microphone. Please grant permission in your browser settings.");
                console.error(err);
                throw err;
            }
        }

        // Cleanup audio context function
        function stopAudioContext() {
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        /* =======================================
           CALL LOGIC (Auto-listen & Random Yes/No)
        ======================================== */
        callBtn.addEventListener('click', async () => {
            try { await initMicrophone(); } catch(e) { return; }

            if (!isCalling) {
                isCalling = true;
                callBtn.innerHTML = '❌';
                callBtn.className = 'btn-round hangup';
                talkBtn.classList.add('hidden'); // Hide talk button during call

                playVideo('Call.mp4', () => {
                    if (isCalling) {
                        startCallListening();
                    }
                });
            } else {
                endCall();
            }
        });

        function startCallListening() {
            showImage('Callidle.jpg');
            statusBar.style.display = 'block';
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            const micSource = audioContext.createMediaStreamSource(globalStream);
            micSource.connect(analyser);
            analyser.fftSize = 256;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            let hasSpoken = false;
            let silenceStartTime = Date.now();
            
            function checkVoice() {
                if (!isCalling || charImg.src.indexOf('Callidle.jpg') === -1) return;
                
                analyser.getByteFrequencyData(dataArray);
                
                let totalVolume = 0;
                for (let i = 0; i < bufferLength; i++) { totalVolume += dataArray[i]; }
                let averageVolume = totalVolume / bufferLength;
                
                // Sensitivity threshold
                if (averageVolume > 15) {
                    if (!hasSpoken) hasSpoken = true;
                    silenceStartTime = Date.now(); // Reset silence timer while talking
                } else {
                    // Trigger after 1.2 seconds of silence
                    if (hasSpoken && (Date.now() - silenceStartTime > 1200)) {
                        statusBar.style.display = 'none';
                        stopAudioContext();
                        
                        // Randomly choose Yes or No
                        const randomAnswer = Math.random() > 0.5 ? 'Yes.mp4' : 'No.mp4';
                        
                        playVideo(randomAnswer, () => {
                            if (isCalling) {
                                startCallListening(); // Listen again after answer
                            }
                        });
                        return;
                    }
                }
                requestAnimationFrame(checkVoice);
            }
            requestAnimationFrame(checkVoice);
        }

        function endCall() {
            isCalling = false;
            statusBar.style.display = 'none';
            stopAudioContext();
            callBtn.innerHTML = '📞';
            callBtn.className = 'btn-round call';
            talkBtn.classList.remove('hidden');
            showImage('Idle.png');
        }


        /* =======================================
           REPEAT LOGIC (Record -> Auto-Silence -> Animate)
        ======================================== */
        talkBtn.addEventListener('click', async () => {
            try { await initMicrophone(); } catch(e) { return; }

            if (!isRecording) {
                if (activeAudio) activeAudio.pause();

                isRecording = true;
                talkBtn.innerHTML = '🛑'; 
                talkBtn.classList.add('recording');
                callBtn.classList.add('hidden'); // Hide call button
                statusBar.style.display = 'block'; // Show "LISTENING"

                // Setup MediaRecorder
                mediaRecorder = new MediaRecorder(globalStream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

                // Playback logic when recording stops
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    activeAudio = new Audio(audioUrl);

                    // Start mouth animation (switching Idle/Talking)
                    activeAudio.onplay = () => {
                        let isMouthOpen = true;
                        showImage('Talking.png'); // initial frame
                        
                        // Alternate images every 150ms for realistic talking effect
                        talkAnimInterval = setInterval(() => {
                            isMouthOpen = !isMouthOpen;
                            showImage(isMouthOpen ? 'Talking.png' : 'Idle.png');
                        }, 150);
                    };

                    // End of playback
                    activeAudio.onended = () => {
                        clearInterval(talkAnimInterval);
                        
                        // Reset UI entirely back to wait mode
                        isRecording = false;
                        talkBtn.innerHTML = '🗣️';
                        talkBtn.classList.remove('recording');
                        callBtn.classList.remove('hidden');
                        showImage('Idle.png');
                    };

                    activeAudio.play().catch(e => {
                        console.error(e);
                        clearInterval(talkAnimInterval);
                        isRecording = false;
                        talkBtn.innerHTML = '🗣️';
                        talkBtn.classList.remove('recording');
                        callBtn.classList.remove('hidden');
                        showImage('Idle.png');
                    });
                };

                mediaRecorder.start();

                // Setup Silence Detection for Repeat Mode
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const micSource = audioContext.createMediaStreamSource(globalStream);
                micSource.connect(analyser);
                analyser.fftSize = 256;

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                let hasSpoken = false;
                let silenceStartTime = Date.now();

                function checkRepeatVoice() {
                    if (!isRecording) return; // Stop if manually interrupted

                    analyser.getByteFrequencyData(dataArray);
                    
                    let totalVolume = 0;
                    for (let i = 0; i < bufferLength; i++) { totalVolume += dataArray[i]; }
                    let averageVolume = totalVolume / bufferLength;

                    if (averageVolume > 15) {
                        if (!hasSpoken) hasSpoken = true;
                        silenceStartTime = Date.now();
                    } else {
                        // If user spoke and was silent for 1.2s -> Auto Stop
                        if (hasSpoken && (Date.now() - silenceStartTime > 1200)) {
                            statusBar.style.display = 'none';
                            stopAudioContext();
                            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                                mediaRecorder.stop(); // Triggers playback
                            }
                            return;
                        }
                    }
                    requestAnimationFrame(checkRepeatVoice);
                }
                requestAnimationFrame(checkRepeatVoice);

            } else {
                // Manual Stop Button Clicked
                statusBar.style.display = 'none';
                stopAudioContext();
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop(); // This stops recording and plays whatever was recorded immediately
                }
            }
        });
    </script>
</body>
</html>
